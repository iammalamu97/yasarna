<div class="lesson-page">
  <div class="instruction">
    <p>Before Shadda, if there is a letter with Jazm, the letter is dropped out in reading (Idgham). The letter that occurs before Jazm is then combined with Shadda.</p>
  </div>
  <div id="lesson51-l32"></div>
</div>

<div class="lesson-page">
  <div class="note-row">
    <span class="note-item"><span class="arabic">مِن وَ</span> is read Mi(n)wwa</span>
    <span class="note-item"><span class="arabic">أَن يَّ</span> is read A(n)yyo not ayya</span>
  </div>
</div>
